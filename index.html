<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="layout">

    <!-- SIDEBAR -->
  <h2>Meu Dashboard</h2>
    <nav>
      <a>Home</a>
      <a>CRM</a>
      <a>Clientes</a>
      <a>Ajuda</a>
    </nav>
  </aside>
    <!-- CONTEUDO -->
    <main class="content">

      <!-- HEADER -->
      <header class="header">
        <h1>Bem-vindo ao Portal da Maya</h1>
      </header>

      <!-- CARDS -->
      <section class="cards">
        <div class="card">Categoria</div>
        <div class="card">Clientes</div>
        <div class="card">Bônus</div>
      </section>

      <!-- BANNER -->
      <section class"banner">
        <img src="banner.jpg">
      </section>

      <!-- BOTÕES -->
      <section class="buttons">
        <button>Materiais de Marketing</button>
        <button>Central de ajuda</button>
        <button>Release Notes</button>
      </section>

    </main>

  </div>
</body>
</html>
